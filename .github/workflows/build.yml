name: Compilar APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v7

      - name: Configurar JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v4

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.7

      - name: Tests unitarios (Calculadora, Cifrado, Dinero)
        run: gradle testFossDebugUnitTest --no-daemon

      - name: Compilar APK de depuración (ambos sabores)
        run: gradle assembleFossDebug assemblePlayDebug --no-daemon

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v7
        with:
          name: bote-debug-apk
          path: |
            app/build/outputs/apk/foss/debug/*.apk
            app/build/outputs/apk/play/debug/*.apk

  # Test de migraciones de BD en emulador (más lento; valida la actualización
  # real desde la versión 4 del esquema, la de v2.5).
  tests-android:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v7

      - name: Habilitar KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Configurar JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v4

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.7

      - name: Test de migraciones en emulador
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          disable-animations: true
          script: gradle connectedFossDebugAndroidTest --no-daemon
