name: Mantener Supabase despierto

# Supabase pausa los proyectos del plan gratuito tras ~7 días sin actividad.
# Esta consulta mínima cada 3 días cuenta como tráfico real de API y de BD.
on:
  schedule:
    - cron: "17 9 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Consulta mínima a la API REST
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "Faltan los secrets SUPABASE_URL / SUPABASE_ANON_KEY" >&2
            exit 1
          fi
          curl -fsS "${URL%/}/rest/v1/eventos_sync?select=uuid&limit=1" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" >/dev/null
          echo "Ping correcto: $(date -u)"
