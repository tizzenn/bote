name: APK firmado de prueba

# Compila el APK release (sabor foss) firmado con la clave real, SIN
# publicar nada: sirve para instalarlo encima de la versión instalada
# y probar la actualización (migraciones de BD incluidas).
on:
  workflow_dispatch: {}

jobs:
  firmar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v7

      - name: Configurar JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v4

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.7

      - name: Restaurar clave de firma
        run: echo "${{ secrets.BOTE_KEYSTORE_B64 }}" | base64 -d > "$RUNNER_TEMP/bote-app.p12"

      - name: Compilar APK firmado (sabor foss)
        env:
          BOTE_KEYSTORE: ${{ runner.temp }}/bote-app.p12
          BOTE_KEYSTORE_PASS: ${{ secrets.BOTE_KEYSTORE_PASS }}
        run: gradle assembleFossRelease --no-daemon

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v7
        with:
          name: bote-firmado-prueba
          path: app/build/outputs/apk/foss/release/*.apk
